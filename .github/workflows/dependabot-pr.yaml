name: Send Dependabot PRs to Slack

on:
  workflow_call:
    secrets:
      slack_bot_token:
        required: true
      slack_webhook_url:
        required: true
  push:
    branches:
      - 'dependabot/**'

permissions:
  contents: read
  id-token: write

jobs:
  RunTerraformValidation:
    name: Run Dependabot PR Review
    runs-on: ubuntu-latest

    steps:
      - name: Send Dependabot PR to Slack
        uses: slackapi/slack-github-action@v1.26.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "New ${{ github.repository}} Dependabot PR Available for Review: ${{ github.event.pull_request.html_url}}"
            }